[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/soundcloudy/callback"
  to = "/.netlify/functions/callback"
  status = 200

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/soundcloudy/*"
  to = "/soundcloudy/index.html"
  status = 200